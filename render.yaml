services:
  - type: web
    name: aiii-app
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        fromSecret: OPENAI_API_KEY
      - key: OPENWEATHER_API_KEY
        fromSecret: OPENWEATHER_API_KEY
      - key: GOOGLE_SEARCH_API_KEY
        fromSecret: GOOGLE_SEARCH_API_KEY
      - key: GOOGLE_CSE_ID
        fromSecret: GOOGLE_CSE_ID
      - key: YOUTUBE_API_KEY
        fromSecret: YOUTUBE_API_KEY
    healthCheckPath: /api/health
    plan: free</content>
<parameter name="filePath">/workspaces/aiii/render.yaml